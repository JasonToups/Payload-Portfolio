x-penpot-flags: &penpot-flags
  PENPOT_FLAGS: disable-email-verification enable-smtp enable-prepl-server disable-secure-session-cookies

x-penpot-uri: &penpot-public-uri
  PENPOT_PUBLIC_URI: http://localhost:9001

x-penpot-body-size: &penpot-http-body-size
  PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 367001600
  PENPOT_HTTP_SERVER_MAX_MULTIPART_BODY_SIZE: 367001600

x-penpot-secret: &penpot-secret-key
  PENPOT_SECRET_KEY: change-this-insecure-local-dev-key

services:
  penpot-frontend:
    image: "penpotapp/frontend:${PENPOT_VERSION:-latest}"
    restart: unless-stopped
    ports:
      - "9001:8080"
    volumes:
      - penpot_assets:/opt/data/assets
    depends_on:
      - penpot-backend
      - penpot-exporter
      - penpot-mcp
    environment:
      <<: *penpot-flags

  penpot-backend:
    image: "penpotapp/backend:${PENPOT_VERSION:-latest}"
    restart: unless-stopped
    volumes:
      - penpot_assets:/opt/data/assets
    depends_on:
      penpot-postgres:
        condition: service_healthy
      penpot-valkey:
        condition: service_healthy
    environment:
      <<: [*penpot-flags, *penpot-public-uri, *penpot-http-body-size, *penpot-secret-key]
      PENPOT_DATABASE_URI: postgresql://penpot-postgres/penpot
      PENPOT_DATABASE_USERNAME: penpot
      PENPOT_DATABASE_PASSWORD: penpot
      PENPOT_REDIS_URI: redis://penpot-valkey/0
      PENPOT_OBJECTS_STORAGE_BACKEND: fs
      PENPOT_OBJECTS_STORAGE_FS_DIRECTORY: /opt/data/assets
      PENPOT_SMTP_DEFAULT_FROM: no-reply@example.com
      PENPOT_SMTP_DEFAULT_REPLY_TO: no-reply@example.com
      PENPOT_SMTP_HOST: penpot-mailcatch
      PENPOT_SMTP_PORT: 1025
      PENPOT_SMTP_TLS: "false"
      PENPOT_SMTP_SSL: "false"

  penpot-exporter:
    image: "penpotapp/exporter:${PENPOT_VERSION:-latest}"
    restart: unless-stopped
    depends_on:
      penpot-valkey:
        condition: service_healthy
    environment:
      <<: *penpot-secret-key
      PENPOT_PUBLIC_URI: http://penpot-frontend:8080
      PENPOT_REDIS_URI: redis://penpot-valkey/0

  penpot-postgres:
    image: postgres:15
    restart: unless-stopped
    ports:
      - "5434:5432"
    volumes:
      - penpot_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: penpot
      POSTGRES_PASSWORD: penpot
      POSTGRES_DB: penpot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot"]
      interval: 2s
      timeout: 5s
      retries: 5

  penpot-valkey:
    image: valkey/valkey:8.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 1s
      timeout: 5s
      retries: 5

  penpot-mailcatch:
    image: sj26/mailcatcher:latest
    restart: unless-stopped
    ports:
      - "1080:1080"

  penpot-mcp:
    image: node:22-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./tools/penpot-mcp:/app
      - ./docker/penpot-mcp/start.sh:/start.sh:ro
      - penpot_mcp_modules:/app/node_modules
      - penpot_mcp_server_modules:/app/mcp-server/node_modules
      - penpot_mcp_plugin_modules:/app/penpot-plugin/node_modules
      - penpot_mcp_common_modules:/app/common/node_modules
    ports:
      - "4400:4400"
      - "4401:4401"
      - "4402:4402"
    command: sh /start.sh
    environment:
      PENPOT_MCP_SERVER_LISTEN_ADDRESS: "0.0.0.0"
      PENPOT_MCP_PLUGIN_SERVER_LISTEN_ADDRESS: "0.0.0.0"
      PENPOT_MCP_SERVER_ADDRESS: "localhost"

volumes:
  penpot_assets:
  penpot_postgres:
  penpot_mcp_modules:
  penpot_mcp_server_modules:
  penpot_mcp_plugin_modules:
  penpot_mcp_common_modules:
