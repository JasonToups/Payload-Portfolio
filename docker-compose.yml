services:
  payload:
    image: node:20-slim
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: >
      sh -c "apt-get update &&
             apt-get install -y --no-install-recommends pandoc wkhtmltopdf xvfb libfontconfig1 libx11-6 libxext6 libxrender1 &&
             rm -rf /var/lib/apt/lists/* &&
             npm install -g pnpm@10 &&
             pnpm install &&
             pnpm dev"
    depends_on:
      - postgres
    env_file:
      - .env

  postgres:
    image: postgres:17-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: now-hiring
    volumes:
      - data:/var/lib/postgresql/data
    logging:
      driver: none

volumes:
  data:
  node_modules:
